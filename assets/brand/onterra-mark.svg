<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Onterra mark">
  <!--
    Onterra brand mark.
    The triangle is the climb from field purchase up to production.
    The two strata lines are the subsurface, the reservoir layers.
    The amber drop at the apex is first oil, the goal of the journey.
  -->
  <g fill="none" stroke="#E9EEF4" stroke-width="6" stroke-linejoin="round" stroke-linecap="round">
    <path d="M50 16 L82 78 H18 Z"/>
  </g>
  <g fill="none" stroke="#E9EEF4" stroke-width="4" stroke-linecap="round" opacity=".55">
    <path d="M33 57 H67"/>
    <path d="M27.5 67 H72.5"/>
  </g>
  <circle cx="50" cy="16" r="7.5" fill="#F2A900"/>
</svg>
